<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src http://localhost:3001">
  <title>Gestión Clínicas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; color: #333; }
    header { background: #2c3e50; color: white; padding: 16px 24px; font-size: 20px; }
    main { padding: 24px; }
    button { padding: 8px 16px; background: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1f6391; }
    #output { margin-top: 20px; background: white; padding: 16px; border-radius: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <header>🏥 Gestión Clínicas</header>
  <main>
    <button id="btnPacientes">Listar Pacientes</button>
    <button id="btnMedicos">Listar Médicos</button>
    <pre id="output">Seleccioná una acción...</pre>
  </main>
  <script src="app.js"></script>
</body>
</html>
