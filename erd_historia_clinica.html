
<style>
#erd svg { width: 100%; height: auto; }
#erd .er.entityBox { rx: 8; }
</style>
<div id="erd" style="padding: 8px 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a3a' : '#eeedfe',
    primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    secondaryColor: dark ? '#1a2a2a' : '#e1f5ee',
    tertiaryColor: dark ? '#2a1a1a' : '#faece7',
  },
});
const diagram = `erDiagram
  Paciente {
    int dni PK
    string nombre
    float peso
    float altura
  }
  HistoriaClinica {
    int expediente PK
    int dniPaciente FK
  }
  Medico {
    int legajo PK
    string nombre
    string especialidad
  }
  Consulta {
    int numeroConsulta PK
    int numeroExpediente FK
    int legajoMedico FK
    datetime fecha
    string motivo
    string diagnostico
    string observaciones
  }
  Tratamiento {
    int numeroTratamiento PK
    int numeroExpediente FK
    int legajoMedico FK
    string descripcion
    datetime fechaInicio
    boolean activo
  }
  Antecedente {
    int id PK
    int numeroExpediente FK
    string tipo
    string descripcion
  }
  Documento {
    int numeroDocumento PK
    int numeroExpediente FK
    string tipo
    string archivo
    datetime fecha
  }

  Paciente ||--|| HistoriaClinica : "tiene"
  HistoriaClinica ||--o{ Consulta : "registra"
  HistoriaClinica ||--o{ Tratamiento : "incluye"
  HistoriaClinica ||--o{ Antecedente : "contiene"
  HistoriaClinica ||--o{ Documento : "adjunta"
  Medico ||--o{ Consulta : "realiza"
  Medico ||--o{ Tratamiento : "prescribe"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd .row-rect-odd path, #erd .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
